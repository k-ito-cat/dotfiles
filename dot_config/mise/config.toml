[tools]
node = "24"
bun = "latest"
uv = "latest"
process-compose = "latest"
"pipx:posting" = "latest"
# zellij 0.44.1以降で端末色問い合わせ応答がprompt/Codex TUIへ漏れたため固定
"aqua:zellij-org/zellij" = "0.44.0"

# npmパッケージ
"npm:@antfu/ni" = "latest"
"npm:@devcontainers/cli" = "latest"
"npm:@rivolink/leaf" = "latest"     # ターミナルMDビューア
"npm:ntn" = "latest"                # notion CLI

# AIコードアシスタント
"npm:@openai/codex" = "latest"
"npm:@anthropic-ai/claude-code" = "latest"
"npm:@github/copilot" = "latest"

# 言語サーバー（LSP）
"aqua:LuaLS/lua-language-server" = "latest"
"aqua:tree-sitter/tree-sitter" = "latest"
"npm:typescript-language-server" = "latest"
"npm:@astrojs/language-server" = "latest"
"npm:vscode-langservers-extracted" = "latest"
"npm:@tailwindcss/language-server" = "latest"

# フォーマッター
"aqua:JohnnyMorganz/StyLua" = "latest"
"aqua:tamasfe/taplo" = "latest"
"npm:prettier" = "latest"

[settings]
minimum_release_age = "7d"
